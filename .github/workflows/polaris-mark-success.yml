name: Polaris Mark Build Status Success

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  polaris-mark-success:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Black Duck Security Scan (mark_build_status=success)
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          polaris_server_url: ${{ vars.POLARIS_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_application_name: 'break-build-test'
          polaris_project_name: 'break-build-test'
          polaris_assessment_types: 'SAST'
          mark_build_status: 'success'
          github_token: ${{ secrets.GITHUB_TOKEN }}
