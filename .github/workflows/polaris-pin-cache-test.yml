name: Polaris Pin + Cache Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pin-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check cache state (before)
        run: |
          echo "=== Before Action ==="
          ls -la ~/bridge-cli-bundle/ 2>/dev/null || echo "cache dir does not exist"
      - name: Cache Bridge CLI
        id: bridge-cache
        uses: actions/cache@v4
        with:
          path: ~/bridge-cli-bundle
          key: bridge-cli-${{ runner.os }}-v3.0.524
      - name: Report cache hit
        run: echo "Cache hit=${{ steps.bridge-cache.outputs.cache-hit }}"
      - name: Black Duck Security Scan (pinned)
        id: scan
        continue-on-error: true
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          polaris_server_url: ${{ vars.POLARIS_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_application_name: 'break-build-test'
          polaris_project_name: 'break-build-test'
          polaris_assessment_types: 'SAST'
          bridgecli_install_directory: /home/runner/bridge-cli-bundle
          bridgecli_download_version: '3.0.524'
          mark_build_status: 'success'
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check cache state (after)
        if: always()
        run: |
          echo "=== After Scan ==="
          ls -la /home/runner/bridge-cli-bundle/ 2>/dev/null | head -5 || echo "no dir"
          echo "Scan outcome=${{ steps.scan.outcome }}"
