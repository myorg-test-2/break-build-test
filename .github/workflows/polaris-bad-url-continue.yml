name: Polaris Bad URL + continue-on-error (outage fail-open test)

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test-bad-url-continue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan with bad URL + continue-on-error
        id: scan
        continue-on-error: true
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          polaris_server_url: 'https://nonexistent.polaris.blackduck.invalid'
          polaris_access_token: 'dummy-outage-token'
          polaris_application_name: 'break-build-test'
          polaris_project_name: 'break-build-test'
          polaris_assessment_types: 'SAST'
          mark_build_status: 'failure'
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Post-scan check
        run: |
          echo "scan outcome=${{ steps.scan.outcome }}"
          echo "scan conclusion=${{ steps.scan.conclusion }}"
